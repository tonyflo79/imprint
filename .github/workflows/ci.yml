name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-contract:
    name: Python ${{ matrix.python }} contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Gitleaks evaluates a commit range that includes the PR head's
          # parent. The default shallow checkout omits that parent for
          # fork-origin PRs, causing a false infrastructure failure.
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev,release]'
      - run: bash tests/acceptance/test_upgrade_from_v300.sh
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: python tools/release/scan_public.py
      - run: python tools/release/package.py
      - name: Prove deterministic rebuild
        run: |
          cp release-artifacts/SHA256SUMS /tmp/first-SHA256SUMS
          python tools/release/package.py
          diff -u /tmp/first-SHA256SUMS release-artifacts/SHA256SUMS
      - run: python tools/release/verify_artifacts.py release-artifacts --expected-revision "$(git rev-parse HEAD)" --source-root .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: imprint-release-candidate
          path: release-artifacts/
          if-no-files-found: error

  artifact-posix:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: imprint-release-candidate
          path: candidate
      - run: python tools/release/verify_artifacts.py candidate --expected-revision "$(git rev-parse HEAD)" --source-root .
      - name: Extract tar artifact
        run: python tools/release/extract_safe.py candidate/imprint-3.0.1.tar.gz extracted
      - name: Empty-HOME artifact acceptance
        run: bash extracted/imprint-3.0.1/tests/acceptance/test_install_posix.sh

  artifact-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: imprint-release-candidate
          path: candidate
      - shell: pwsh
        run: python tools/release/verify_artifacts.py candidate --expected-revision "$(git rev-parse HEAD)" --source-root .
      - name: Extract ZIP artifact
        shell: pwsh
        run: python tools/release/extract_safe.py candidate/imprint-3.0.1.zip extracted
      - name: Genuine Windows empty-profile acceptance
        shell: pwsh
        run: ./extracted/imprint-3.0.1/tests/acceptance/test_install_windows.ps1
