name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-contract:
    name: Python ${{ matrix.python }} contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev,release]'
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: python tools/release/scan_public.py
      - run: python tools/release/package.py
      - name: Prove deterministic rebuild
        run: |
          cp release-artifacts/SHA256SUMS /tmp/first-SHA256SUMS
          python tools/release/package.py
          diff -u /tmp/first-SHA256SUMS release-artifacts/SHA256SUMS
      - run: python tools/release/verify_artifacts.py release-artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: imprint-release-candidate
          path: release-artifacts/
          if-no-files-found: error

  artifact-posix:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: imprint-release-candidate
          path: candidate
      - run: python tools/release/verify_artifacts.py candidate
      - name: Extract tar artifact
        run: python tools/release/extract_safe.py candidate/imprint-3.0.0.tar.gz extracted
      - name: Empty-HOME artifact acceptance
        run: bash extracted/imprint-3.0.0/tests/acceptance/test_install_posix.sh

  artifact-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: imprint-release-candidate
          path: candidate
      - run: python tools/release/verify_artifacts.py candidate
      - name: Extract ZIP artifact
        shell: pwsh
        run: python tools/release/extract_safe.py candidate/imprint-3.0.0.zip extracted
      - name: Genuine Windows empty-profile acceptance
        shell: pwsh
        run: ./extracted/imprint-3.0.0/tests/acceptance/test_install_windows.ps1
